services:
  update-server:
    build: .
    container_name: update-server
    restart: unless-stopped
    ports:
      - "${PORT:-3600}:3600"
    environment:
      - PORT=3600
      - ADMIN_API_KEY=${ADMIN_API_KEY:-change-me-to-a-strong-random-string}
      - UPLOAD_DIR=/app/uploads
      - DATABASE_PATH=/app/data/update-server.db
      - BASE_URL=${BASE_URL:-http://localhost:3600}
    volumes:
      - update-uploads:/app/uploads
      - update-data:/app/data

volumes:
  update-uploads:
  update-data:
