services:
  update-server:
    build: .
    container_name: update-server
    restart: unless-stopped
    ports:
      - "${PORT:-3600}:3600"
    environment:
      - PORT=3600
      - ADMIN_API_KEY=${ADMIN_API_KEY:-change-me-to-a-strong-random-string}
      - UPLOAD_DIR=/app/uploads
      - BASE_URL=${BASE_URL:-http://localhost:3600}
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-appdb}
      - SYNC_API_TOKEN=${SYNC_API_TOKEN}
    volumes:
      - /data/common-server/uploads:/app/uploads
    networks:
      - gateway-network
      - infra-network

networks:
  gateway-network:
    external: true
  infra-network:
    external: true
